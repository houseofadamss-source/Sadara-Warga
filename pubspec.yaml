name: sadarawarga
description: "sadarawarga"
publish_to: 'none'

version: 1.1.0+2

environment:
  sdk: ^3.12.1

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  supabase_flutter: ^2.14.0
  video_player: ^2.11.1
  image_picker: ^1.2.2
  shared_preferences: ^2.3.2
  geolocator: ^14.0.3
  flutter_local_notifications: ^22.0.0
  url_launcher: ^6.3.2
  intl: ^0.20.2
  path_provider: ^2.1.5
  path: ^1.9.1
  # Library buat tarik Judul/Foto dari Link secara otomatis
  metadata_fetch: ^0.4.2
  http: ^1.2.0
  connectivity_plus: ^7.1.1
  flutter_map: ^8.3.0
  latlong2: ^0.9.1
  oauth2_client: ^4.3.2
  flutter_secure_storage: ^10.3.1
  flutter_markdown: ^0.7.7+1
  package_info_plus: ^10.1.0

dependency_overrides:
  intl: ^0.19.0
  app_links: ^6.4.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: "^0.13.1"

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/images/Logo.png"
  min_sdk_android: 21 # android >= 5.0
  adaptive_icon_background: "#0F766E"
  adaptive_icon_foreground: "assets/images/Logo.png"

flutter:
  uses-material-design: true

  assets:
    - assets/images/
